version: "3.9"

# Enterprise docker-compose with PostgreSQL, Redis, and the app
# Usage: docker-compose -f docker-compose.enterprise.yml up

services:
  postgres:
    image: postgres:16-alpine
    container_name: ast_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ast_password}
      POSTGRES_DB: ${POSTGRES_DB:-ai_software_team}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ast} -d ${POSTGRES_DB:-ai_software_team}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ast_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ast_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-ast}:${POSTGRES_PASSWORD:-ast_password}@postgres:5432/${POSTGRES_DB:-ai_software_team}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-https://yourdomain.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-6}
      THINKING_BUDGET: ${THINKING_BUDGET:-8000}
      MAX_ROUNDS: ${MAX_ROUNDS:-3}
      MIN_ROUNDS: ${MIN_ROUNDS:-3}
      MAX_CONCURRENT_PIPELINES: ${MAX_CONCURRENT_PIPELINES:-3}
      OUTPUT_TTL_HOURS: ${OUTPUT_TTL_HOURS:-24}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_TEAM: ${STRIPE_PRICE_TEAM:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      RATE_LIMIT_PIPELINE_MAX: ${RATE_LIMIT_PIPELINE_MAX:-5}
      RATE_LIMIT_PIPELINE_WINDOW_MS: ${RATE_LIMIT_PIPELINE_WINDOW_MS:-900000}
    volumes:
      - outputs_data:/app/outputs
    ports:
      - "${APP_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Optional: pgAdmin for DB management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ast_pgadmin
    restart: unless-stopped
    profiles: ["admin"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  outputs_data:
  pgadmin_data:

networks:
  default:
    name: ast_network
