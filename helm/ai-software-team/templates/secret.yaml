{{/*
  PRODUCTION NOTE:
  In production environments, do NOT store real credentials in this Helm-managed Secret.
  Instead, use one of these approaches:
    - external-secrets operator (https://external-secrets.io) with AWS Secrets Manager / GCP Secret Manager / Vault
    - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
    - HashiCorp Vault Agent Injector

  For local / staging use, override values at deploy time:
    helm upgrade --install ai-team ./helm/ai-software-team \
      --set secrets.anthropicApiKey="sk-ant-..." \
      --set secrets.jwtSecret="$(openssl rand -hex 32)" \
      --set secrets.databaseUrl="postgresql://user:pass@host:5432/db"
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-software-team.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-software-team.labels" . | nindent 4 }}
  annotations:
    # Prevent accidental deletion
    helm.sh/resource-policy: keep
type: Opaque
data:
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  stripe-secret-key: {{ .Values.secrets.stripeSecretKey | b64enc | quote }}
  {{- if .Values.postgresql.enabled }}
  database-url: {{ include "ai-software-team.databaseUrl" . | b64enc | quote }}
  {{- else }}
  database-url: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  {{- end }}
  {{- if .Values.redis.enabled }}
  redis-url: {{ include "ai-software-team.redisUrl" . | b64enc | quote }}
  {{- else if .Values.redis.externalUrl }}
  redis-url: {{ .Values.redis.externalUrl | b64enc | quote }}
  {{- end }}
