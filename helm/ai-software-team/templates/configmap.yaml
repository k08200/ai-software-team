apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-software-team.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-software-team.labels" . | nindent 4 }}
data:
  # ── Application configuration (non-sensitive) ──────────────────────────────
  NODE_ENV: {{ .Values.env.NODE_ENV | quote }}
  PORT: {{ .Values.env.PORT | quote }}
  ANTHROPIC_MODEL: {{ .Values.env.ANTHROPIC_MODEL | quote }}
  MAX_ROUNDS: {{ .Values.env.MAX_ROUNDS | quote }}
  CLIENT_ORIGIN: {{ .Values.env.CLIENT_ORIGIN | quote }}
  {{- if .Values.env.STRIPE_PRICE_ID }}
  STRIPE_PRICE_ID: {{ .Values.env.STRIPE_PRICE_ID | quote }}
  {{- end }}
